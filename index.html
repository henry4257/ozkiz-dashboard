<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오즈키즈 FC 매출 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;color:#f1f5f9;white-space:nowrap}
header h1 span{color:#38bdf8}
.main-tabs{display:flex;gap:4px;background:#0f172a;border-radius:8px;padding:4px}
.main-tab{padding:6px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;color:#94a3b8;background:transparent;font-family:inherit}
.main-tab.active{background:#38bdf8;color:#0f172a}
.main-tab:hover:not(.active){background:#1e293b;color:#e2e8f0}
.controls-bar{padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #1e293b;background:#0f172a}
.store-select{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 12px;color:#e2e8f0;font-size:13px;min-width:210px;cursor:pointer;font-family:inherit}
.store-select:focus{outline:none;border-color:#38bdf8}
.btn-group{display:flex;gap:2px;background:#1e293b;border-radius:6px;padding:3px}
.btn-group button{padding:4px 12px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;color:#94a3b8;background:transparent;font-family:inherit}
.btn-group button.active{background:#38bdf8;color:#0f172a}
.btn-group button:hover:not(.active){background:#334155;color:#e2e8f0}
.note-tag{font-size:11px;color:#64748b;padding:3px 8px;background:#1e293b;border-radius:4px;border:1px solid #334155;margin-left:auto}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px;padding:14px 24px}
.card{background:#1e293b;border-radius:10px;padding:14px 16px;border:1px solid #334155}
.card-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.card-value{font-size:21px;font-weight:700;color:#f1f5f9;margin-bottom:3px}
.card-sub{font-size:11px;color:#64748b}
.growth-up{color:#22d3ee}
.growth-down{color:#f87171}
.growth-flat{color:#94a3b8}
.content-area{padding:14px 24px}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #334155}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#1e293b}
th{padding:9px 14px;text-align:right;font-weight:600;color:#94a3b8;font-size:11px;white-space:nowrap;border-bottom:1px solid #334155}
th:first-child{text-align:left}
td{padding:8px 14px;text-align:right;border-bottom:1px solid #1e293b;color:#e2e8f0;white-space:nowrap}
td:first-child{text-align:left;color:#94a3b8;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ffffff08}
.td-growth{font-weight:700;font-size:12px}
.td-total td{background:#1e293b90;font-weight:700;color:#f1f5f9;border-top:1px solid #334155}
.td-total td:first-child{color:#38bdf8}
.chart-wrap{background:#1e293b;border-radius:10px;border:1px solid #334155;padding:16px}
.chart-wrap canvas{max-height:380px}
.partial-badge{display:inline-block;font-size:10px;padding:1px 5px;background:#7c3aed20;color:#a78bfa;border:1px solid #7c3aed40;border-radius:3px;margin-left:4px;vertical-align:middle}

.section{display:none}
.section.active{display:block}
.hidden{display:none!important}
.divider{width:1px;height:18px;background:#334155}
#loading{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}

@keyframes spin{to{transform:rotate(360deg)}}

let STORES = [], T25 = [], T26 = [], S25 = {}, S26 = {};

function parseCSV(text) {
  // BOM 제거
  text = text.replace(/^\uFEFF/, '');
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cell += '"'; i++; } // escaped quote ""
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(cell.trim()); cell = '';
    } else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++; // CRLF
      row.push(cell.trim());
      if (row.some(v => v)) rows.push(row);
      row = []; cell = '';
    } else {
      // 따옴표 안 줄바꿈(c==='\n' && inQ)은 여기서 cell에 추가됨
      cell += c;
    }
  }
  if (cell || row.length) { row.push(cell.trim()); if (row.some(v=>v)) rows.push(row); }
  return rows;
}
function pn(s) { const n = parseInt((s||'').replace(/[,\s]/g,'')); return isNaN(n)?0:n; }

async function loadData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=44834537`;
    const res = await fetch(url);
    const rows = parseCSV(await res.text());

    // Row 0: [년, "", 월, 수, 합계, 매장당평균, store1, store2, ...]
    const hdr = rows[0];
    // 셀 내 줄바꿈 정규화: "(신)의정부온라인\n(SSG)" → "(신)의정부온라인(SSG)"
    const allNames = hdr.slice(6).map(n => n.replace(/\s*\n\s*/g, ''));

    let curYear = '';
    const monthly = {};
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (row[0]) curYear = row[0];
      if (curYear !== '25년' && curYear !== '26년') continue;
      const mi = MONTHS.indexOf(row[2]);
      if (mi < 0) continue;
      if (!monthly[curYear]) monthly[curYear] = {};
      monthly[curYear][mi] = { total: pn(row[4]), stores: row.slice(6).map(pn) };
    }

    T25 = MONTHS.map((_, i) => monthly['25년']?.[i]?.total || 0);

    // T26: up to last month with data
    let last26 = -1;
    for (let i = 0; i < 12; i++) if ((monthly['26년']?.[i]?.total||0) > 0) last26 = i;
    T26 = [];
    for (let i = 0; i <= last26; i++) T26.push(monthly['26년'][i]?.total || 0);

    // Build STORES — filter hidden and empty
    STORES = allNames
      .map((name, i) => ({ id: i, name }))
      .filter(s => {
        if (!s.name) return false;
        if (HIDDEN_STORES.includes(s.name)) return false;
        const has25 = MONTHS.some((_, mi) => (monthly['25년']?.[mi]?.stores[s.id]||0) > 0);
        const has26 = T26.some((_, mi) => (monthly['26년']?.[mi]?.stores[s.id]||0) > 0);
        return has25 || has26;
      });

    S25 = {}; S26 = {};
    STORES.forEach(s => {
      S25[s.id] = MONTHS.map((_, mi) => monthly['25년']?.[mi]?.stores[s.id] || 0);
      S26[s.id] = T26.map((_, mi) => monthly['26년']?.[mi]?.stores[s.id] || 0);
    });

    const lastM = T26.length > 0 ? MONTHS[T26.length-1] : '';
    const noteText = `온라인 제외 · ${lastM}까지 집계`;
    document.getElementById('note-total').textContent = noteText;
    document.getElementById('note-store').textContent = `${lastM}까지 집계`;
  } catch(e) {
    console.warn('시트 로드 실패, 내장 데이터 사용:', e);
    useFallback();
  }
}

// ═══════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════
const M=(v)=>v?`${(v/1e6).toFixed(1)}M`:'-';
const FULL=(v)=>v?v.toLocaleString('ko-KR')+'원':'-';
function getStore(id){ return STORES.find(s=>s.id===id)||STORES[0]; }
function ytdLabel(){ return T26.length>0?`1~${MONTHS[T26.length-1]}`:'1~?'; }

function growthHtml(cur,prev){
  if(!prev)return'<span class="growth-flat">-</span>';
  const g=(cur-prev)/prev*100;
  if(g>0.05)return`<span class="growth-up">▲${g.toFixed(1)}%</span>`;
  if(g<-0.05)return`<span class="growth-down">▼${Math.abs(g).toFixed(1)}%</span>`;
  return'<span class="growth-flat">±0.0%</span>';
}

function toGranRows(arr,gran,idxs){
  return idxs.map(i=>({
    label:gran==='monthly'?MONTHS[i]:MONTHS[i]+'(일평균)',
    val: gran==='monthly'?(arr[i]||0):Math.round((arr[i]||0)/DAYS[i]),
    month:i
  }));
}

function renderCards(id,a26,a25){
  const n=a26.length;
  const ytd26=a26.reduce((s,v)=>s+v,0);
  const ytd25=a25.slice(0,n).reduce((s,v)=>s+v,0);
  const ytd25y=a25.reduce((s,v)=>s+v,0);
  const lbl=ytdLabel();
  document.getElementById(id).innerHTML=`
    <div class="card">
      <div class="card-label">26년 누적 (${lbl})</div>
      <div class="card-value">${M(ytd26)}</div>
      <div class="card-sub">${FULL(ytd26)}</div>
    </div>
    <div class="card">
      <div class="card-label">25년 동기간 (${lbl})</div>
      <div class="card-value">${M(ytd25)}</div>
      <div class="card-sub">${FULL(ytd25)}</div>
    </div>
    <div class="card">
      <div class="card-label">전년 동기 대비</div>
      <div class="card-value" style="font-size:20px">${growthHtml(ytd26,ytd25)}</div>
      <div class="card-sub">${ytd26>=ytd25?'↑':'↓'} ${M(Math.abs(ytd26-ytd25))}</div>
    </div>
    <div class="card">
      <div class="card-label">25년 연간 합계</div>
      <div class="card-value">${M(ytd25y)}</div>
      <div class="card-sub">${FULL(ytd25y)}</div>
    </div>`;
}

function renderCumulativeTable(id){
  const n=T26.length, lbl=ytdLabel();
  let html=`<table><thead><tr>
    <th>매장명</th><th>25년 동기간 (${lbl})</th><th>26년 누적 (${lbl})</th><th>전년비</th><th>증감액</th>
  </tr></thead><tbody>`;
  let tot26=0,tot25=0;
  STORES.forEach(s=>{
    const a25=S25[s.id]||[], a26=S26[s.id]||[];
    const v25=a25.slice(0,n).reduce((a,b)=>a+b,0);
    const v26=a26.reduce((a,b)=>a+b,0);
    if(!v25&&!v26)return;
    tot26+=v26; tot25+=v25;
    const diff=v26-v25;
    html+=`<tr>
      <td>${s.name}</td><td>${M(v25)}</td><td>${M(v26)}</td>
      <td class="td-growth">${growthHtml(v26,v25)}</td>
      <td class="td-growth">${diff>=0?'<span class="growth-up">+':'<span class="growth-down">'}${M(Math.abs(diff))}</span></td>
    </tr>`;
  });
  const diff=tot26-tot25;
  html+=`<tr class="td-total">
    <td>전체 합계</td><td>${M(tot25)}</td><td>${M(tot26)}</td>
    <td class="td-growth">${growthHtml(tot26,tot25)}</td>
    <td class="td-growth">${diff>=0?'<span class="growth-up">+':'<span class="growth-down">'}${M(Math.abs(diff))}</span></td>
  </tr>`;
  html+='</tbody></table>';
  document.getElementById(id).innerHTML=html;
}

function renderPeriodTable(id,a25,a26,gran,label25,label26){
  const idxs26=a26.map((_,i)=>i);
  const rows26=toGranRows(a26,gran,idxs26);
  const rows25=toGranRows(a25,gran,idxs26);
  const lbl=ytdLabel();
  let html=`<table><thead><tr>
    <th>기간</th><th>${label25}</th><th>${label26}</th><th>전년비</th><th>증감액</th>
  </tr></thead><tbody>`;
  rows26.forEach((r,i)=>{
    const v26=r.val, v25=rows25[i].val, diff=v26-v25;
    const isLast=r.month===T26.length-1;
    html+=`<tr>
      <td>${r.label}${isLast?'<span class="partial-badge">집계중</span>':''}</td>
      <td>${M(v25)}</td><td>${M(v26)}</td>
      <td class="td-growth">${growthHtml(v26,v25)}</td>
      <td class="td-growth">${diff>=0?'<span class="growth-up">+':'<span class="growth-down">'}${M(Math.abs(diff))}</span></td>
    </tr>`;
  });
  const ytd26=a26.reduce((s,v)=>s+v,0), ytd25s=a25.slice(0,a26.length).reduce((s,v)=>s+v,0), dytd=ytd26-ytd25s;
  html+=`<tr class="td-total">
    <td>누적 (${lbl})</td><td>${M(ytd25s)}</td><td>${M(ytd26)}</td>
    <td class="td-growth">${growthHtml(ytd26,ytd25s)}</td>
    <td class="td-growth">${dytd>=0?'<span class="growth-up">+':'<span class="growth-down">'}${M(Math.abs(dytd))}</span></td>
  </tr>`;
  for(let i=a26.length;i<12;i++){
    html+=`<tr style="opacity:.45"><td>${MONTHS[i]}</td><td>${M(a25[i])}</td><td style="color:#334155">-</td><td>-</td><td>-</td></tr>`;
  }
  const ytd25y=a25.reduce((s,v)=>s+v,0);
  html+=`<tr class="td-total" style="opacity:.7"><td>25년 연간 합계</td><td>${M(ytd25y)}</td><td>-</td><td>-</td><td>-</td></tr>`;
  html+='</tbody></table>';
  document.getElementById(id).innerHTML=html;
}

function renderWeeklyTable(id,wk26,wk25,label25,label26){
  const cur26=wk26||[], cur25=wk25||[];
  let html=`<table><thead><tr>
    <th>주차</th><th>${label25}</th><th>${label26}</th><th>전년비</th><th>증감액</th>

  WK_LABELS.forEach((lbl,i)=>{
    const v26=cur26[i]||0, v25=cur25[i]||0, diff=v26-v25;

      <td>${v25?M(v25):'-'}</td><td>${v26?M(v26):'-'}</td>
      <td class="td-growth">${(v26&&v25)?growthHtml(v26,v25):'<span class="growth-flat">-</span>'}</td>
      <td class="td-growth">${(v26&&v25)?(diff>=0?'<span class="growth-up">+':'<span class="growth-down">')+M(Math.abs(diff))+'</span>':'-'}</td>
    </tr>`;
  });
  const sum26=cur26.slice(1).reduce((s,v)=>s+(v||0),0), sum25=cur25.slice(1).reduce((s,v)=>s+(v||0),0), dsum=sum26-sum25;
  html+=`<tr class="td-total">

  </tr>`;
  html+='</tbody></table>';
  document.getElementById(id).innerHTML=html;
}

function renderStoreCumulativeTable(id,storeId){
  const n=T26.length, a25=S25[storeId]||[], a26=S26[storeId]||[];
  const ytd25=a25.slice(0,n).reduce((s,v)=>s+v,0), ytd26=a26.reduce((s,v)=>s+v,0);

function renderChart(canvasId,a25,a26,gran,storeName,wk26,wk25){
  if(charts[canvasId]){charts[canvasId].destroy();delete charts[canvasId];}
  let labels, d26, d25;
  if(gran==='weekly'&&wk26){
    labels=WK_LABELS;
    d26=wk26.map(v=>+(v/1e6).toFixed(2));
    d25=(wk25||[]).map(v=>+((v||0)/1e6).toFixed(2));
  } else {
    const idxs=a26.map((_,i)=>i);
    const rows26=toGranRows(a26,gran==='cumulative'?'monthly':gran,idxs);
    const rows25=toGranRows(a25,gran==='cumulative'?'monthly':gran,idxs);
    labels=rows26.map(r=>r.label.replace('(일평균)',''));
    d26=rows26.map(r=>+(r.val/1e6).toFixed(2));
    d25=rows25.map(r=>+(r.val/1e6).toFixed(2));
  }
  const dg=d26.map((v,i)=>d25[i]?+((v-d25[i])/d25[i]*100).toFixed(1):null);
  const ctx=document.getElementById(canvasId).getContext('2d');
  charts[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'2025년 (백만원)',data:d25,backgroundColor:'#334155cc',borderRadius:4,order:2},
      {label:'2026년 (백만원)',data:d26,backgroundColor:'#38bdf8cc',borderRadius:4,order:2},
      {label:'전년비 (%)',data:dg,type:'line',borderColor:'#f472b6',backgroundColor:'#f472b615',borderWidth:2,pointRadius:5,pointBackgroundColor:'#f472b6',yAxisID:'y2',order:1,tension:.3}
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:12}}},tooltip:{callbacks:{label(c){return c.dataset.yAxisID==='y2'?` 전년비: ${c.parsed.y>0?'+':''}${c.parsed.y}%`:` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}M`;}}}},
      scales:{x:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b',callback:v=>v+'M'},grid:{color:'#1e293b50'}},y2:{position:'right',ticks:{color:'#f472b6',callback:v=>v+'%'},grid:{drawOnChartArea:false}}}
    }
  });
}

function renderCumulativeChart(canvasId){
  if(charts[canvasId]){charts[canvasId].destroy();delete charts[canvasId];}
  const n=T26.length, labels=[],d25=[],d26=[];
  STORES.forEach(s=>{
    const a25=S25[s.id]||[], a26=S26[s.id]||[];
    const v25=a25.slice(0,n).reduce((a,b)=>a+b,0), v26=a26.reduce((a,b)=>a+b,0);
    if(!v25&&!v26)return;
    labels.push(s.name); d25.push(+(v25/1e6).toFixed(1)); d26.push(+(v26/1e6).toFixed(1));
  });
  const ctx=document.getElementById(canvasId).getContext('2d');

      plugins:{legend:{labels:{color:'#94a3b8',font:{size:12}}},tooltip:{callbacks:{label(c){return` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}M`;}}}},
      scales:{x:{ticks:{color:'#64748b',maxRotation:45},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b',callback:v=>v+'M'},grid:{color:'#1e293b50'}}}

}

function renderTotal(){
  const{gran,disp}=state.total;
  renderCards('cards-total',T26,T25);
  const showTable=disp==='table';
  document.getElementById('table-total').classList.toggle('hidden',!showTable);
  document.getElementById('chart-total').classList.toggle('hidden',showTable);
  if(gran==='cumulative'){
    if(showTable) renderCumulativeTable('table-total'); else renderCumulativeChart('canvas-total');
  } else if(gran==='weekly'){
    if(showTable) renderWeeklyTable('table-total',WK_T26,WK_T25,'25년','26년');
    else          renderChart('canvas-total',T25,T26,gran,null,WK_T26,WK_T25);
  } else {
    if(showTable) renderPeriodTable('table-total',T25,T26,gran,'25년','26년');
    else          renderChart('canvas-total',T25,T26,gran);
  }
}

function renderStore(){
  const{gran,disp,id}=state.store;
  const a25=S25[id]||[], a26=S26[id]||[];
  renderCards('cards-store',a26,a25);
  const showTable=disp==='table';
  document.getElementById('table-store').classList.toggle('hidden',!showTable);
  document.getElementById('chart-store').classList.toggle('hidden',showTable);
  const s=getStore(id);
  const wkd=WK_BY_NAME[s.name]||null;
  if(gran==='cumulative'){
    if(showTable) renderStoreCumulativeTable('table-store',id); else renderChart('canvas-store',a25,a26,'monthly',s.name);
  } else if(gran==='weekly'){
    if(wkd){
      if(showTable) renderWeeklyTable('table-store',wkd.s26,wkd.s25,'25년 '+s.name,'26년 '+s.name);
      else          renderChart('canvas-store',a25,a26,gran,s.name,wkd.s26,wkd.s25);
    } else {
      document.getElementById('table-store').innerHTML='<div style="padding:20px;color:#64748b">주차별 데이터 없음</div>';
    }
  } else {
    if(showTable) renderPeriodTable('table-store',a25,a26,gran,'25년 '+s.name,'26년 '+s.name);
    else          renderChart('canvas-store',a25,a26,gran,s.name);
  }
}

function switchMain(tab){
  state.main=tab;
  document.querySelectorAll('.main-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='total')||(i===1&&tab==='store')));
  document.getElementById('sec-total').classList.toggle('active',tab==='total');
  document.getElementById('sec-store').classList.toggle('active',tab==='store');
  if(tab==='total')renderTotal();else renderStore();
}
function setGran(sec,val){
  state[sec].gran=val;
  const btns=document.getElementById('gran-'+sec).querySelectorAll('button');
  ['cumulative','monthly','weekly','daily'].forEach((v,i)=>btns[i].classList.toggle('active',v===val));
  if(sec==='total')renderTotal();else renderStore();
}

  state[sec].disp=val;
  document.getElementById('disp-'+sec).querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',['table','chart'][i]===val));
  if(sec==='total')renderTotal();else renderStore();
}
function onStoreChange(){
  state.store.id=+document.getElementById('store-select').value;
  renderStore();
}

(async function init(){
  await loadData();
  document.getElementById('loading').style.display='none';
  const sel=document.getElementById('store-select');
  STORES.forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id; o.textContent=s.name;
    sel.appendChild(o);
  });
  state.store.id=STORES[0]?.id||0;
  renderTotal();
})();
</script>
</body>
